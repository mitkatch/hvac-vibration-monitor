# ============================================
# I2C and Sensors
# ============================================
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME280=y

# ============================================
# Logging — DISABLED for boot diagnostic
# Re-enable once firmware boots successfully:
#   CONFIG_LOG=y
#   CONFIG_LOG_MODE_IMMEDIATE=y
#   CONFIG_UART_CONSOLE=y
# ============================================
CONFIG_LOG=n
CONFIG_UART_CONSOLE=n

# ============================================
# Stack Sizes
# ============================================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=2048

# ============================================
# Floating point printf
# ============================================
CONFIG_CBPRINTF_FP_SUPPORT=y

# ============================================
# Bluetooth Low Energy (BLE)
# ============================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="HVAC-Vibe"

# GATT
CONFIG_BT_GATT_DYNAMIC_DB=n

# Connection parameters
CONFIG_BT_MAX_CONN=1

# MTU size (increase for larger packets)
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# ============================================
# Security Manager (SMP) - Required for pairing
# ============================================
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_PAIRED=4
CONFIG_BT_FIXED_PASSKEY=n
CONFIG_BT_SMP_APP_PAIRING_ACCEPT=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_SC_ONLY=n

# ============================================
# Flash / NVS Settings (for bonding key storage)
# ============================================
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_RUNTIME=y

# ============================================
# Random Number Generator
# ============================================
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_NRF5_RNG=y

# ============================================
# GATT Security
# ============================================
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
